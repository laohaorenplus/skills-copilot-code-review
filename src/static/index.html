<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="https://github.githubassets.com/favicons/favicon.svg"
    />
  </head>
  <body>
    <!-- Dynamic announcement banners rendered by app.js -->
    <div id="announcements-area" aria-live="polite" aria-label="Announcements"></div>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <div id="user-controls">
        <div id="announcement-controls" class="hidden">
          <button id="manage-announcements-button" class="icon-button" aria-label="Manage Announcements">
            <span aria-hidden="true">📢</span>
            <span>Announcements</span>
          </button>
        </div>
        <div id="user-status">
          <button id="login-button" class="icon-button">
            <span class="user-icon">👤</span>
            <span>Login</span>
          </button>
          <div id="user-info" class="hidden">
            <span id="display-name"></span>
            <button id="logout-button">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section id="activities-container">
        <div class="main-content-layout">
          <!-- Left Sidebar for Filters -->
          <aside class="sidebar-filters">
            <h3>Filter Activities</h3>
            <!-- Search Box -->
            <div class="search-box">
              <input type="text" id="activity-search" placeholder="Search activities..." />
              <button id="search-button" aria-label="Search">
                <span class="search-icon">🔍</span>
              </button>
            </div>

            <div class="filter-container">
              <div class="filter-label">Filter by category:</div>
              <div class="category-filters" id="category-filters">
                <button class="category-filter active" data-category="all">All</button>
                <button class="category-filter" data-category="sports">Sports</button>
                <button class="category-filter" data-category="arts">Arts</button>
                <button class="category-filter" data-category="academic">Academic</button>
                <button class="category-filter" data-category="community">Community</button>
                <button class="category-filter" data-category="technology">Technology</button>
              </div>
            </div>

            <!-- Day Filter -->
            <div class="filter-container day-filter-container">
              <div class="filter-label">Filter by day:</div>
              <div class="day-filters" id="day-filters">
                <button class="day-filter active" data-day="">All Days</button>
                <button class="day-filter" data-day="Monday">Monday</button>
                <button class="day-filter" data-day="Tuesday">Tuesday</button>
                <button class="day-filter" data-day="Wednesday">Wednesday</button>
                <button class="day-filter" data-day="Thursday">Thursday</button>
                <button class="day-filter" data-day="Friday">Friday</button>
                <button class="day-filter" data-day="Saturday">Saturday</button>
                <button class="day-filter" data-day="Sunday">Sunday</button>
              </div>
            </div>

            <!-- Time Filter -->
            <div class="filter-container time-filter-container">
              <div class="filter-label">Filter by time:</div>
              <div class="time-filters">
                <button class="time-filter active" data-time="">All Times</button>
                <button class="time-filter" data-time="morning">Before School</button>
                <button class="time-filter" data-time="afternoon">After School</button>
                <button class="time-filter" data-time="weekend">Weekend</button>
              </div>
            </div>
          </aside>

          <!-- Activities Content -->
          <div class="activities-content">
            <div id="activities-list">
              <!-- Activities will be loaded here -->
              <p>Loading activities...</p>
            </div>
            <div id="message" class="hidden message"></div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <!-- Registration Modal -->
    <div id="registration-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3>Register for <span id="modal-activity-name"></span></h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <input type="hidden" id="activity" value="" />
          <button type="submit">Register</button>
        </form>
      </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-login-modal">&times;</span>
        <h3>Teacher Login</h3>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" required placeholder="Enter your username" />
          </div>
          <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" required placeholder="Enter your password" />
          </div>
          <button type="submit">Login</button>
        </form>
        <div id="login-message" class="hidden message"></div>
      </div>
    </div>

    <!-- Announcements Management Dialog -->
    <div id="announcements-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="announcements-modal-title">
      <div class="modal-content announcements-modal-content">
        <button class="close-announcements-modal" aria-label="Close announcements dialog">&times;</button>
        <h3 id="announcements-modal-title">📢 Manage Announcements</h3>

        <!-- Announcements list -->
        <div id="announcements-list-section">
          <div id="announcements-table-container">
            <p id="announcements-empty-msg" class="announcements-empty hidden">No announcements yet. Add one below.</p>
            <ul id="announcements-table" class="announcements-list" aria-label="All announcements"></ul>
          </div>
        </div>

        <!-- Add / Edit form -->
        <div id="announcement-form-section">
          <h4 id="announcement-form-title">Add New Announcement</h4>
          <form id="announcement-form" novalidate>
            <input type="hidden" id="announcement-edit-id" value="" />
            <div class="form-group">
              <label for="ann-message">Message <span class="required-mark" aria-hidden="true">*</span></label>
              <textarea id="ann-message" rows="3" required placeholder="Enter announcement text…" aria-required="true"></textarea>
            </div>
            <div class="announcement-dates">
              <div class="form-group">
                <label for="ann-start-date">Start Date <span class="optional-mark">(optional)</span></label>
                <input type="date" id="ann-start-date" aria-label="Announcement start date (optional)" />
              </div>
              <div class="form-group">
                <label for="ann-expiration-date">Expiration Date <span class="required-mark" aria-hidden="true">*</span></label>
                <input type="date" id="ann-expiration-date" required aria-required="true" aria-label="Announcement expiration date (required)" />
              </div>
            </div>
            <div id="announcement-form-error" class="form-error hidden" role="alert"></div>
            <div class="announcement-form-actions">
              <button type="button" id="announcement-cancel-edit" class="btn-secondary hidden">Cancel Edit</button>
              <button type="submit" id="announcement-submit-btn">Add Announcement</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
